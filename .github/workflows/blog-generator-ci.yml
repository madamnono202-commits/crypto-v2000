name: "Blog Generator CI"

on:
  push:
    branches: [main]
    paths:
      - "blog-generator/**"
  pull_request:
    branches: [main]
    paths:
      - "blog-generator/**"

  # Placeholder for future cron/automation triggers
  # schedule:
  #   - cron: "0 6 * * *"

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blog-generator

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: blog-generator/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
