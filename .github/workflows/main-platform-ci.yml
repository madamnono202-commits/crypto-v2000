name: "Main Platform CI"

on:
  push:
    branches: [main]
    paths-ignore:
      - "blog-generator/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "blog-generator/**"

  # Placeholder for future cron/automation triggers
  # workflow_dispatch:
  #   inputs:
  #     deploy_target:
  #       description: "Deploy target"
  #       required: false

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
